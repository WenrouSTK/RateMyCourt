<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>深网地图 · HIG 深色预览</title>
<style>
  :root {
    --c-bg:        #000000;
    --c-bg-elev:   #1C1C1E;
    --c-bg-chip:   #2C2C2E;
    --c-bg-chip-2: #3A3A3C;
    --c-text:      #FFFFFF;
    --c-text-2:    rgba(235,235,245,.60);
    --c-text-3:    rgba(235,235,245,.30);
    --c-sep:       rgba(84,84,88,.50);
    --c-blue:      #0A84FF;
    --c-orange:    #FF9F0A;
    --c-red:       #FF453A;
    --c-green:     #30D158;
    --c-purple:    #BF5AF2;
    --c-tabbar-bg: rgba(28,28,30,.72);
    --c-shadow:    0 4px 20px rgba(0,0,0,.45);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0A0A0A;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
                 "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
    letter-spacing: -0.2px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 60px;
    padding: 40px;
    flex-wrap: wrap;
  }

  /* 标题 */
  .title {
    position: fixed;
    top: 20px; left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,.5);
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* iPhone 外壳 */
  .phone {
    width: 390px;
    height: 844px;
    background: var(--c-bg);
    color: var(--c-text);
    border-radius: 54px;
    box-shadow:
      0 0 0 12px #2C2C2E,
      0 0 0 14px #48484A,
      0 30px 80px rgba(0,0,0,.6),
      0 0 120px rgba(10,132,255,.08);
    overflow: hidden;
    position: relative;
  }
  .notch {
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 34px;
    background: #000;
    border-radius: 20px;
    z-index: 100;
  }
  .screen {
    position: absolute;
    inset: 0;
    overflow: auto;
    padding-top: 54px;
    padding-bottom: 120px;
    background: var(--c-bg);
  }
  .screen::-webkit-scrollbar { display: none; }

  .status {
    position: absolute;
    top: 18px; left: 30px; right: 30px;
    display: flex; justify-content: space-between;
    font-size: 14px; font-weight: 600;
    color: #fff;
    z-index: 50;
  }

  /* Large Title */
  .large-title { padding: 12px 24px 16px; }
  .lt-main {
    font-size: 34px;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.4px;
    color: var(--c-text);
  }
  .lt-sub {
    margin-top: 4px;
    font-size: 13px;
    color: var(--c-text-3);
  }

  /* 搜索胶囊 */
  .search-wrap { padding: 0 16px; }
  .search-pill {
    display: flex;
    align-items: center;
    height: 40px;
    padding: 0 14px;
    background: var(--c-bg-chip);
    border-radius: 999px;
    gap: 8px;
  }
  .search-pill input {
    flex: 1;
    border: none;
    background: transparent;
    outline: none;
    font-size: 16px;
    color: var(--c-text);
  }
  .search-pill input::placeholder { color: var(--c-text-3); }
  .s-picker {
    font-size: 13px; color: var(--c-text-2);
    padding-left: 8px;
    border-left: 1px solid var(--c-sep);
  }

  /* 分段控件 */
  .segment {
    display: flex;
    margin: 12px 16px 4px;
    padding: 3px;
    background: var(--c-bg-chip);
    border-radius: 999px;
  }
  .seg-item {
    flex: 1;
    text-align: center;
    padding: 8px 0;
    font-size: 13px;
    color: var(--c-text-2);
    border-radius: 999px;
    cursor: pointer;
    transition: all .2s ease;
  }
  .seg-item.on {
    background: var(--c-bg-chip-2);
    color: var(--c-text);
    font-weight: 600;
    box-shadow: 0 1px 4px rgba(0,0,0,.4);
  }

  /* 卡片 */
  .list { padding: 4px 0 8px; }
  .court-card {
    display: flex;
    gap: 12px;
    padding: 12px;
    margin: 8px 16px;
    background: var(--c-bg-elev);
    border-radius: 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
    transition: transform .2s ease;
    cursor: pointer;
  }
  .court-card:active { transform: scale(0.98); }

  .thumb {
    width: 104px; height: 104px;
    border-radius: 14px;
    background: linear-gradient(135deg, #2C2C2E, #3A3A3C);
    flex-shrink: 0;
    object-fit: cover;
  }

  .info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  .row-between { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .court-name {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1; min-width: 0;
    color: var(--c-text);
  }
  .distance {
    font-size: 12px;
    color: var(--c-blue);
    font-weight: 500;
    flex-shrink: 0;
  }
  .meta { font-size: 13px; color: var(--c-text-2); }
  .stars { color: var(--c-orange); font-weight: 600; }
  .muted { color: var(--c-text-3); }

  .tag-row {
    display: flex; flex-wrap: wrap; gap: 4px;
    margin-top: 2px;
  }
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 8px;
    font-size: 11px;
    background: var(--c-bg-chip);
    color: var(--c-text-2);
  }
  .tag-type {
    background: transparent;
    border: 1px solid;
    font-weight: 500;
  }
  .price-num {
    font-size: 16px;
    font-weight: 700;
    color: var(--c-orange);
    letter-spacing: -0.3px;
  }

  /* 悬浮胶囊 Tab Bar */
  .tabbar-wrap {
    position: absolute;
    left: 0; right: 0;
    bottom: 16px;
    display: flex;
    justify-content: center;
    pointer-events: none;
  }
  .tabbar {
    pointer-events: auto;
    display: flex;
    gap: 4px;
    padding: 5px;
    background: var(--c-tabbar-bg);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-radius: 999px;
    box-shadow:
      0 4px 20px rgba(0,0,0,.5),
      inset 0 0 0 0.5px rgba(255,255,255,.08);
  }
  .tab {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 9px 18px;
    border-radius: 999px;
    font-size: 13px;
    color: var(--c-text-2);
    cursor: pointer;
    transition: all .25s ease;
  }
  .tab.on {
    background: var(--c-blue);
    color: #fff;
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(10,132,255,.5);
  }
  .tab-icon { font-size: 16px; }
</style>
</head>
<body>

<div class="title">深网地图 · Apple HIG · Dark Mode</div>

<div class="phone">
  <div class="notch"></div>
  <div class="status"><span>9:41</span><span>●●●  ▲ ⚡</span></div>
  <div class="screen" id="screen"></div>
</div>

<script>
const courts = [
  {
    name: '深圳湾体育中心网球场', district: '南山',
    rating: 4.5, count: 12, distance: '3.2km', price: 80,
    types: [{ label: '硬地', icon: '🎾', color: '#0A84FF' }],
    env: '☀️ ☂️', facility: ['🅿️', '🚇', '🚿', '🎾'],
    img: 'https://images.unsplash.com/photo-1554068865-24cecd4e34b8?w=400',
  },
  {
    name: '南山科兴网球场', district: '南山',
    rating: 4.3, count: 8, distance: '1.2km', price: 100,
    types: [
      { label: '硬地', icon: '🎾', color: '#0A84FF' },
      { label: '室内', icon: '🏠', color: '#BF5AF2' },
    ],
    env: '❄️', facility: ['🅿️', '🚇', '🚿', '🎾'],
    img: 'https://images.unsplash.com/photo-1577471487943-9c5edb6d1f40?w=400',
  },
  {
    name: '龙岗红土网球训练中心', district: '龙岗',
    rating: 4.7, count: 23, distance: '37.2km', price: 120,
    types: [{ label: '红土', icon: '🟫', color: '#FF9F0A' }],
    env: '☀️', facility: ['🅿️', '🚿', '🎾'],
    img: 'https://images.unsplash.com/photo-1622279457486-28e993fb4ac2?w=400',
  },
  {
    name: '香蜜公园网球场', district: '福田',
    rating: 4.2, count: 6, distance: '8.7km', price: 60,
    types: [{ label: '硬地', icon: '🎾', color: '#0A84FF' }],
    env: '☀️', facility: ['🅿️'],
    img: 'https://images.unsplash.com/photo-1595435934249-5df7ed86e1c0?w=400',
  },
  {
    name: '莲花山网球场', district: '福田',
    rating: 4.0, count: 4, distance: '11.8km', price: 50,
    types: [{ label: '硬地', icon: '🎾', color: '#0A84FF' }],
    env: '☀️', facility: ['🅿️', '🚇'],
    img: 'https://images.unsplash.com/photo-1551958219-acbc608c6377?w=400',
  },
];

document.getElementById('screen').innerHTML = `
  <div class="large-title">
    <div class="lt-main">深网地图</div>
    <div class="lt-sub">深圳球友的场地百科全书</div>
  </div>

  <div class="search-wrap">
    <div class="search-pill">
      <span style="opacity:.6">🔍</span>
      <input placeholder="搜索球场名称" />
      <div class="s-picker">全部区 ▾</div>
    </div>
  </div>

  <div class="segment">
    <div class="seg-item on">离我最近</div>
    <div class="seg-item">评分优先</div>
    <div class="seg-item">最新收录</div>
  </div>

  <div class="list">
    ${courts.map(c => `
      <div class="court-card">
        <img class="thumb" src="${c.img}" />
        <div class="info">
          <div class="row-between">
            <div class="court-name">${c.name}</div>
            <div class="distance">${c.distance}</div>
          </div>
          <div class="meta">
            <span class="stars">★ ${c.rating}</span>
            <span class="muted"> · ${c.count} 条 · ${c.district}</span>
          </div>
          <div class="tag-row">
            ${c.types.map(t => `
              <span class="tag tag-type" style="color:${t.color};border-color:${t.color}66;background:${t.color}18">
                ${t.icon} ${t.label}
              </span>
            `).join('')}
            <span class="tag">${c.env}</span>
            ${c.facility.map(f => `<span class="tag">${f}</span>`).join('')}
          </div>
          <div style="margin-top:2px">
            <span class="price-num">¥${c.price}</span>
            <span class="muted" style="font-size:12px"> 起/时</span>
          </div>
        </div>
      </div>
    `).join('')}
  </div>

  <div class="tabbar-wrap">
    <div class="tabbar">
      <div class="tab on"><span class="tab-icon">🎾</span>球场</div>
      <div class="tab"><span class="tab-icon">👤</span>我的</div>
    </div>
  </div>
`;
</script>
</body>
</html>
